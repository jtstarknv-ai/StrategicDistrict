<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password - StrategicDistrict</title>
  <meta name="description" content="Set a new password for your StrategicDistrict account.">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Source+Serif+Pro:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="/styles/variables.css">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/header.css">
  <link rel="stylesheet" href="/styles/footer.css">
  <link rel="stylesheet" href="/styles/components.css">
  <link rel="stylesheet" href="/styles/forms.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
  
  <style>
    body {
      padding-top: var(--header-height, 80px);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      padding: var(--spacing-5xl) var(--spacing-lg);
      background: linear-gradient(135deg, var(--color-primary-cream) 0%, rgba(198, 172, 143, 0.05) 100%);
    }

    .auth-container {
      max-width: 480px;
      margin: 0 auto;
      background: white;
      padding: var(--spacing-3xl) var(--spacing-2xl);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-lg);
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--spacing-3xl);
    }

    .auth-header h1 {
      font-family: var(--font-serif);
      font-size: var(--font-size-h3);
      color: var(--color-text-primary);
      margin-bottom: var(--spacing-md);
    }

    .auth-header p {
      color: var(--color-text-muted);
      font-size: var(--font-size-body-sm);
    }

    .form-group {
      margin-bottom: var(--spacing-lg);
    }

    label {
      display: block;
      font-weight: var(--font-weight-semibold);
      margin-bottom: var(--spacing-sm);
      color: var(--color-text-primary);
      font-size: var(--font-size-body-sm);
    }

    input[type="password"] {
      width: 100%;
      padding: var(--spacing-md) var(--spacing-md);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: var(--font-size-body-md);
      color: var(--color-text-primary);
      background-color: white;
      transition: all var(--transition-base);
      box-sizing: border-box;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: var(--color-pop-gold);
      box-shadow: 0 0 0 3px rgba(212, 165, 55, 0.1);
      background-color: white;
    }

    input::placeholder {
      color: var(--color-text-muted);
    }

    .error-message {
      color: #dc2626;
      font-size: var(--font-size-body-sm);
      margin-top: var(--spacing-xs);
      display: block;
    }

    .success-message {
      background-color: #ecfdf5;
      border: 1px solid #86efac;
      color: #166534;
      padding: var(--spacing-md);
      border-radius: var(--radius-md);
      margin-bottom: var(--spacing-lg);
      font-size: var(--font-size-body-sm);
    }

    .warning-message {
      background-color: #fef3c7;
      border: 1px solid #fcd34d;
      color: #92400e;
      padding: var(--spacing-md);
      border-radius: var(--radius-md);
      margin-bottom: var(--spacing-lg);
      font-size: var(--font-size-body-sm);
    }

    .btn-submit {
      width: 100%;
      padding: var(--spacing-md) var(--spacing-lg);
      background-color: var(--color-pop-gold);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: var(--font-size-body-md);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: all var(--transition-base);
      margin-top: var(--spacing-lg);
    }

    .btn-submit:hover {
      background-color: #c49c2d;
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .auth-footer {
      text-align: center;
      margin-top: var(--spacing-2xl);
      padding-top: var(--spacing-2xl);
      border-top: 1px solid var(--color-border-light);
    }

    .auth-footer p {
      color: var(--color-text-muted);
      font-size: var(--font-size-body-sm);
    }

    .auth-footer a {
      color: var(--color-pop-gold);
      text-decoration: none;
      font-weight: var(--font-weight-semibold);
      transition: color var(--transition-base);
    }

    .auth-footer a:hover {
      color: #c49c2d;
      text-decoration: underline;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }

    @media (max-width: 767px) {
      main {
        padding: var(--spacing-3xl) var(--spacing-md);
      }

      .auth-container {
        padding: var(--spacing-2xl) var(--spacing-lg);
      }

      .auth-header h1 {
        font-size: var(--font-size-h4);
      }
    }
  </style>
</head>
<body>
  <!-- Rainbow Gradient Bar -->
  <div class="rainbow-bar"></div>
  
  <!-- Header -->
  <header>
    <div class="header-content">
      <a href="/" class="logo">
        <img src="/assets/images/SDlogo.png" alt="Strategic District" height="36">
        <span>Strategic District</span>
      </a>
      <nav class="main-nav">
        <a href="/what-we-offer/">What We Offer</a>
        <a href="/how-it-works/">How It Works</a>
        <a href="/sample-plan/">Strategic Plans</a>
        <a href="/contact/">Contact</a>
      </nav>
      <div class="header-actions">
        <div id="auth-buttons"></div>
      </div>
    </div>
    <div class="header-rainbow-bar"></div>
  </header>

  <main>
    <div class="auth-container">
      <div class="auth-header">
        <h1>Set New Password</h1>
        <p>Enter a new password for your account.</p>
      </div>

      <div id="success-message" class="success-message" style="display: none;"></div>
      <div id="error-message" class="error-message" style="display: none;"></div>
      <div id="warning-message" class="warning-message" style="display: none;"></div>

      <form id="reset-form" style="display: none;">
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" name="password" required placeholder="At least 6 characters">
          <span class="error-message" id="password-error"></span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password">
          <span class="error-message" id="confirmPassword-error"></span>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">Set Password</button>
      </form>

      <div class="auth-footer">
        <p><a href="/login/">Back to sign in</a></p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-content">
      <div class="footer-bottom">
        <div class="footer-copyright">
          © 2026 Strategic District. All rights reserved. Powered by <a href="https://starkanalytica.com" style="color: rgba(234, 224, 213, 0.8); text-decoration: none;">Stark Analytica LLC</a>.
        </div>
      </div>
    </div>
  </footer>

  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Auth Library -->
  <script src="/js/shared/auth.js"></script>

  <script>
    (function() {
      "use strict";

      var form = document.getElementById("reset-form");
      var submitBtn = document.getElementById("submit-btn");
      var successMessage = document.getElementById("success-message");
      var errorMessage = document.getElementById("error-message");
      var warningMessage = document.getElementById("warning-message");

      function clearMessages() {
        successMessage.style.display = "none";
        errorMessage.style.display = "none";
        warningMessage.style.display = "none";
      }

      function showSuccess(message) {
        clearMessages();
        successMessage.textContent = message;
        successMessage.style.display = "block";
      }

      function showError(message) {
        clearMessages();
        errorMessage.textContent = message;
        errorMessage.style.display = "block";
      }

      function showWarning(message) {
        clearMessages();
        warningMessage.textContent = message;
        warningMessage.style.display = "block";
      }

      function validateForm() {
        var password = document.getElementById("password").value;
        var confirmPassword = document.getElementById("confirmPassword").value;
        var isValid = true;

        document.getElementById("password-error").textContent = "";
        document.getElementById("confirmPassword-error").textContent = "";

        if (!password) {
          document.getElementById("password-error").textContent = "Password is required";
          isValid = false;
        } else if (password.length < 6) {
          document.getElementById("password-error").textContent = "Password must be at least 6 characters";
          isValid = false;
        }

        if (!confirmPassword) {
          document.getElementById("confirmPassword-error").textContent = "Please confirm your password";
          isValid = false;
        } else if (password !== confirmPassword) {
          document.getElementById("confirmPassword-error").textContent = "Passwords do not match";
          isValid = false;
        }

        return isValid;
      }

      function checkAuth() {
        if (!window.sdAuth.getSession()) {
          showWarning("Your password reset link may have expired. Please request a new one.");
          form.style.display = "none";
          return false;
        }
        return true;
      }

      if (checkAuth()) {
        form.style.display = "block";
      }

      form.addEventListener("submit", function(e) {
        e.preventDefault();

        if (!validateForm()) {
          return;
        }

        var password = document.getElementById("password").value;
        var user = window.sdAuth.getUser();

        if (!user) {
          showError("Session expired. Please request a new password reset link.");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.classList.add("loading");
        submitBtn.textContent = "Setting password...";

        window.sdAuth.client.auth.updateUser({
          password: password
        }).then(function(result) {
          submitBtn.disabled = false;
          submitBtn.classList.remove("loading");
          submitBtn.textContent = "Set Password";

          if (result.error) {
            showError("Error: " + result.error.message);
          } else {
            showSuccess("Password updated successfully! Redirecting to sign in...");
            setTimeout(function() {
              window.location.href = "/login/";
            }, 2000);
          }
        }).catch(function(error) {
          submitBtn.disabled = false;
          submitBtn.classList.remove("loading");
          submitBtn.textContent = "Set Password";
          showError("Error: " + error.message);
        });
      });
    })();
  </script>
</body>
</html>
